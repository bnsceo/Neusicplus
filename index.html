<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#07090d" />
  <title>Neusicplus — Native DAW UI Preview</title>
  <style>
    :root {
      --bg: #07090d;
      --panel: rgba(18, 22, 30, 0.92);
      --panel-2: rgba(11, 15, 21, 0.95);
      --line: rgba(255,255,255,.085);
      --line-strong: rgba(255,255,255,.15);
      --text: #f4f7fa;
      --muted: #8b97a7;
      --amber: #f0ae3d;
      --amber-soft: rgba(240,174,61,.16);
      --cyan: #31d8ff;
      --violet: #8c6cff;
      --red: #ff5f69;
      --green: #42dfa0;
      --radius: 18px;
      --shadow: 0 24px 80px rgba(0,0,0,.45);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; background: var(--bg); color: var(--text); }
    body {
      background:
        radial-gradient(circle at 75% 0%, rgba(49,216,255,.08), transparent 28%),
        radial-gradient(circle at 15% 30%, rgba(140,108,255,.08), transparent 30%),
        var(--bg);
      overflow-x: hidden;
    }

    button, input { font: inherit; }
    button { color: inherit; }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 74px minmax(0, 1fr) 300px;
      grid-template-rows: 72px minmax(0, 1fr) 88px;
      gap: 1px;
      background: var(--line);
    }

    .glass {
      background: linear-gradient(180deg, rgba(18,22,30,.96), rgba(10,13,18,.94));
      backdrop-filter: blur(20px);
    }

    .topbar {
      grid-column: 1 / 4;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: max(14px, env(safe-area-inset-top)) 20px 14px;
      border-bottom: 1px solid var(--line);
      position: sticky;
      top: 0;
      z-index: 30;
    }

    .brand { display: flex; align-items: center; gap: 12px; min-width: 0; }
    .mark {
      width: 34px; height: 34px; border-radius: 12px;
      background: conic-gradient(from 210deg, var(--amber), var(--cyan), var(--violet), var(--amber));
      box-shadow: 0 0 28px rgba(49,216,255,.18);
      position: relative;
    }
    .mark::after { content: ""; position: absolute; inset: 5px; border-radius: 9px; background: #0b0e13; }
    .brand-copy strong { display: block; font-size: 14px; letter-spacing: .18em; }
    .brand-copy span { color: var(--muted); font-size: 11px; }

    .transport { display: flex; align-items: center; gap: 8px; }
    .icon-btn, .pill, .track-btn {
      border: 1px solid var(--line);
      background: rgba(255,255,255,.035);
      border-radius: 12px;
      min-height: 42px;
      padding: 0 14px;
      cursor: pointer;
      transition: .18s ease;
      touch-action: manipulation;
    }
    .icon-btn { width: 42px; padding: 0; display: grid; place-items: center; }
    .icon-btn:hover, .pill:hover, .track-btn:hover { transform: translateY(-1px); border-color: var(--line-strong); background: rgba(255,255,255,.07); }
    .icon-btn.primary { background: var(--amber); color: #14100a; border-color: transparent; }
    .icon-btn.record.active { background: var(--red); border-color: transparent; box-shadow: 0 0 24px rgba(255,95,105,.35); }
    .clock { min-width: 92px; text-align: center; font-variant-numeric: tabular-nums; font-weight: 700; color: var(--amber); }

    .top-actions { justify-self: end; display: flex; align-items: center; gap: 8px; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); box-shadow: 0 0 14px var(--green); }

    .sidebar {
      grid-column: 1;
      grid-row: 2 / 4;
      padding: 14px 10px calc(14px + env(safe-area-inset-bottom));
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    .nav-btn {
      width: 50px; height: 50px; border-radius: 15px; border: 1px solid transparent;
      background: transparent; color: var(--muted); cursor: pointer; font-size: 18px;
    }
    .nav-btn.active { color: var(--text); background: var(--amber-soft); border-color: rgba(240,174,61,.24); }
    .nav-spacer { flex: 1; }

    .workspace { grid-column: 2; grid-row: 2; min-width: 0; overflow: auto; background: #090c11; }
    .workspace-head {
      height: 52px; display: flex; align-items: center; justify-content: space-between;
      padding: 0 16px; border-bottom: 1px solid var(--line); position: sticky; top: 0; z-index: 10;
      background: rgba(9,12,17,.94); backdrop-filter: blur(16px);
    }
    .project-title { display: flex; gap: 10px; align-items: center; min-width: 0; }
    .project-title strong { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .badge { color: var(--muted); border: 1px solid var(--line); border-radius: 999px; padding: 5px 9px; font-size: 11px; }

    .ruler {
      height: 34px; margin-left: 118px; border-bottom: 1px solid var(--line);
      background-image: repeating-linear-gradient(90deg, transparent 0 79px, rgba(255,255,255,.07) 80px);
      display: grid; grid-template-columns: repeat(8, 80px); align-items: center;
      color: #66717e; font-size: 10px; padding-left: 8px;
    }

    .timeline { min-width: 860px; position: relative; }
    .playhead { position: absolute; top: 34px; bottom: 0; width: 1px; background: var(--amber); left: 205px; z-index: 8; pointer-events: none; box-shadow: 0 0 14px rgba(240,174,61,.5); }
    .playhead::before { content: ""; position: absolute; top: -2px; left: -5px; width: 11px; height: 11px; border-radius: 3px 3px 50% 50%; background: var(--amber); }

    .track {
      display: grid; grid-template-columns: 118px minmax(700px, 1fr); min-height: 116px;
      border-bottom: 1px solid var(--line); position: relative;
    }
    .track-meta {
      padding: 14px 12px; border-right: 1px solid var(--line); background: var(--panel-2);
      display: flex; flex-direction: column; gap: 10px;
    }
    .track-name { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 700; }
    .track-color { width: 8px; height: 8px; border-radius: 50%; }
    .track-controls { display: flex; gap: 6px; }
    .track-btn { width: 32px; min-height: 30px; padding: 0; border-radius: 9px; font-size: 11px; font-weight: 800; }
    .track-btn.active { background: var(--amber); color: #12100c; border-color: transparent; }
    .meter { height: 5px; border-radius: 99px; background: #1d242c; overflow: hidden; }
    .meter span { display: block; height: 100%; width: var(--level); background: linear-gradient(90deg, var(--green), var(--amber), var(--red)); }

    .lane {
      position: relative;
      background-image:
        repeating-linear-gradient(90deg, transparent 0 79px, rgba(255,255,255,.04) 80px),
        linear-gradient(180deg, rgba(255,255,255,.012), rgba(255,255,255,0));
      padding: 15px 14px;
    }
    .clip {
      height: 84px; width: var(--clip-width); border: 1px solid color-mix(in srgb, var(--clip) 50%, white 5%);
      background: linear-gradient(180deg, color-mix(in srgb, var(--clip) 22%, transparent), color-mix(in srgb, var(--clip) 10%, transparent));
      border-radius: 13px; overflow: hidden; position: relative; box-shadow: inset 0 1px rgba(255,255,255,.08);
    }
    .clip-label { position: absolute; top: 8px; left: 10px; font-size: 11px; font-weight: 700; color: #e9f0f7; z-index: 2; }
    .wave {
      position: absolute; inset: 29px 8px 8px;
      background:
        linear-gradient(90deg, transparent 0 2%, var(--clip) 2% 3%, transparent 3% 5%, var(--clip) 5% 6%, transparent 6% 8%, var(--clip) 8% 9%, transparent 9% 11%),
        repeating-linear-gradient(90deg, transparent 0 5px, color-mix(in srgb, var(--clip) 80%, white 10%) 5px 7px, transparent 7px 11px);
      mask: radial-gradient(ellipse at center, black 0 48%, transparent 52%) 0 0/26px 100% repeat-x;
      opacity: .8;
    }

    .inspector { grid-column: 3; grid-row: 2; padding: 16px; overflow: auto; }
    .panel { border: 1px solid var(--line); background: rgba(255,255,255,.025); border-radius: var(--radius); padding: 15px; margin-bottom: 12px; box-shadow: var(--shadow); }
    .panel h3 { margin: 0 0 14px; font-size: 12px; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); }
    .control-row { display: grid; grid-template-columns: 1fr auto; gap: 12px; align-items: center; margin: 12px 0; }
    .control-row label { font-size: 13px; color: #c8d0da; }
    .knob {
      --value: 68%; width: 44px; height: 44px; border-radius: 50%;
      background: conic-gradient(var(--amber) 0 var(--value), #222a33 var(--value));
      position: relative;
    }
    .knob::after { content: ""; position: absolute; inset: 6px; border-radius: 50%; background: #11161c; box-shadow: inset 0 0 0 1px var(--line); }
    .fader { width: 120px; accent-color: var(--amber); }
    .select { background: #11161c; color: var(--text); border: 1px solid var(--line); border-radius: 10px; padding: 8px 10px; }

    .mixer {
      grid-column: 2 / 4; grid-row: 3;
      display: grid; grid-template-columns: repeat(4, minmax(130px, 1fr)) minmax(160px, .8fr);
      gap: 1px; background: var(--line); border-top: 1px solid var(--line);
      padding-bottom: env(safe-area-inset-bottom);
    }
    .channel { background: #0d1117; padding: 10px 12px; display: grid; grid-template-columns: auto 1fr auto; gap: 8px; align-items: center; }
    .channel strong { font-size: 11px; }
    .channel input { width: 100%; accent-color: var(--amber); }
    .db { color: var(--muted); font-size: 10px; font-variant-numeric: tabular-nums; }
    .master { background: linear-gradient(180deg, rgba(240,174,61,.12), #0d1117); }

    .mobile-tabs { display: none; }
    .mobile-inspector-toggle { display: none; }

    @media (max-width: 1050px) {
      .app { grid-template-columns: 66px minmax(0,1fr); grid-template-rows: 68px minmax(0,1fr) 82px; }
      .topbar { grid-column: 1 / 3; }
      .top-actions .pill span { display: none; }
      .inspector { display: none; }
      .workspace { grid-column: 2; }
      .mixer { grid-column: 2; }
      .mobile-inspector-toggle { display: inline-grid; }
    }

    @media (max-width: 720px) {
      .app { display: block; min-height: 100vh; background: var(--bg); }
      .topbar { position: sticky; display: grid; grid-template-columns: 1fr auto; padding: max(10px, env(safe-area-inset-top)) 12px 10px; min-height: 64px; }
      .brand-copy span, .top-actions, .sidebar, .inspector, .mixer { display: none; }
      .brand-copy strong { font-size: 12px; }
      .transport { gap: 6px; justify-self: end; }
      .transport .icon-btn:nth-child(1), .transport .icon-btn:nth-child(5) { display: none; }
      .clock { min-width: 70px; font-size: 12px; }
      .workspace { height: calc(100vh - 128px); overflow: auto; }
      .workspace-head { height: 48px; padding: 0 12px; }
      .workspace-head .pill { display: none; }
      .timeline { min-width: 680px; }
      .ruler { margin-left: 94px; grid-template-columns: repeat(8, 70px); background-size: 70px 100%; }
      .track { grid-template-columns: 94px minmax(560px, 1fr); min-height: 106px; }
      .track-meta { padding: 10px 8px; }
      .track-name { font-size: 11px; }
      .clip { height: 74px; }
      .mobile-tabs {
        display: grid; grid-template-columns: repeat(4,1fr); position: fixed; left: 0; right: 0; bottom: 0; z-index: 40;
        background: rgba(10,13,18,.96); backdrop-filter: blur(22px); border-top: 1px solid var(--line);
        padding: 8px 8px calc(8px + env(safe-area-inset-bottom));
      }
      .mobile-tabs button { border: 0; background: transparent; color: var(--muted); min-height: 44px; border-radius: 12px; }
      .mobile-tabs button.active { color: var(--amber); background: var(--amber-soft); }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar glass">
      <div class="brand">
        <div class="mark" aria-hidden="true"></div>
        <div class="brand-copy"><strong>NEUSICPLUS</strong><span>Native DAW · UI Preview</span></div>
      </div>

      <div class="transport" aria-label="Transport controls">
        <button class="icon-btn" id="rewind" aria-label="Rewind">↶</button>
        <button class="icon-btn primary" id="play" aria-label="Play">▶</button>
        <button class="icon-btn record" id="record" aria-label="Record">●</button>
        <div class="clock" id="clock">00:00.0</div>
        <button class="icon-btn" id="loop" aria-label="Loop">∞</button>
      </div>

      <div class="top-actions">
        <span class="status-dot"></span>
        <button class="pill"><span>Audio Ready</span></button>
        <button class="icon-btn mobile-inspector-toggle">☷</button>
      </div>
    </header>

    <aside class="sidebar glass" aria-label="Primary navigation">
      <button class="nav-btn active" title="Timeline">▤</button>
      <button class="nav-btn" title="Mixer">◫</button>
      <button class="nav-btn" title="Sounds">◉</button>
      <button class="nav-btn" title="Projects">⌘</button>
      <div class="nav-spacer"></div>
      <button class="nav-btn" title="Settings">⚙</button>
    </aside>

    <section class="workspace">
      <div class="workspace-head">
        <div class="project-title"><strong>Untitled Session</strong><span class="badge">120 BPM · 4/4</span></div>
        <button class="pill" id="addTrack">＋ Add Track</button>
      </div>

      <div class="timeline" id="timeline">
        <div class="ruler"><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span></div>
        <div class="playhead" id="playhead"></div>

        <div class="track" data-track="1">
          <div class="track-meta">
            <div class="track-name"><span class="track-color" style="background:#31d8ff"></span>Vocal</div>
            <div class="track-controls"><button class="track-btn mute">M</button><button class="track-btn solo">S</button><button class="track-btn">FX</button></div>
            <div class="meter"><span style="--level:72%"></span></div>
          </div>
          <div class="lane"><div class="clip" style="--clip:#31d8ff; --clip-width:68%"><div class="clip-label">Lead Vocal.wav</div><div class="wave"></div></div></div>
        </div>

        <div class="track" data-track="2">
          <div class="track-meta">
            <div class="track-name"><span class="track-color" style="background:#8c6cff"></span>Harmony</div>
            <div class="track-controls"><button class="track-btn mute">M</button><button class="track-btn solo">S</button><button class="track-btn">FX</button></div>
            <div class="meter"><span style="--level:47%"></span></div>
          </div>
          <div class="lane"><div class="clip" style="--clip:#8c6cff; --clip-width:52%; margin-left:9%"><div class="clip-label">Harmony Stack</div><div class="wave"></div></div></div>
        </div>

        <div class="track" data-track="3">
          <div class="track-meta">
            <div class="track-name"><span class="track-color" style="background:#42dfa0"></span>Beat</div>
            <div class="track-controls"><button class="track-btn mute">M</button><button class="track-btn solo">S</button><button class="track-btn">FX</button></div>
            <div class="meter"><span style="--level:83%"></span></div>
          </div>
          <div class="lane"><div class="clip" style="--clip:#42dfa0; --clip-width:84%"><div class="clip-label">Live Loop 01</div><div class="wave"></div></div></div>
        </div>

        <div class="track" data-track="4">
          <div class="track-meta">
            <div class="track-name"><span class="track-color" style="background:#f0ae3d"></span>Keys</div>
            <div class="track-controls"><button class="track-btn mute">M</button><button class="track-btn solo">S</button><button class="track-btn">FX</button></div>
            <div class="meter"><span style="--level:62%"></span></div>
          </div>
          <div class="lane"><div class="clip" style="--clip:#f0ae3d; --clip-width:44%; margin-left:27%"><div class="clip-label">Warm Chords</div><div class="wave"></div></div></div>
        </div>
      </div>
    </section>

    <aside class="inspector glass">
      <div class="panel">
        <h3>Selected Track</h3>
        <div class="control-row"><label>Gain</label><div class="knob" style="--value:72%"></div></div>
        <div class="control-row"><label>Pan</label><input class="fader" type="range" min="0" max="100" value="50" /></div>
        <div class="control-row"><label>Input</label><select class="select"><option>Microphone</option><option>Import Audio</option></select></div>
      </div>
      <div class="panel">
        <h3>Quick Effects</h3>
        <div class="control-row"><label>Compression</label><input type="checkbox" checked /></div>
        <div class="control-row"><label>Reverb</label><input class="fader" type="range" value="32" /></div>
        <div class="control-row"><label>Delay</label><input class="fader" type="range" value="18" /></div>
      </div>
      <div class="panel">
        <h3>Session</h3>
        <div class="control-row"><label>Sample Rate</label><span class="badge">48 kHz</span></div>
        <div class="control-row"><label>Bit Depth</label><span class="badge">24-bit</span></div>
        <div class="control-row"><label>Latency</label><span class="badge">5.3 ms</span></div>
      </div>
    </aside>

    <section class="mixer glass">
      <div class="channel"><strong>VOC</strong><input type="range" value="72" /><span class="db">-4.2</span></div>
      <div class="channel"><strong>HAR</strong><input type="range" value="58" /><span class="db">-7.1</span></div>
      <div class="channel"><strong>BEAT</strong><input type="range" value="80" /><span class="db">-2.8</span></div>
      <div class="channel"><strong>KEYS</strong><input type="range" value="64" /><span class="db">-5.9</span></div>
      <div class="channel master"><strong>MASTER</strong><input type="range" value="74" /><span class="db">-1.0</span></div>
    </section>
  </main>

  <nav class="mobile-tabs" aria-label="Mobile navigation">
    <button class="active">Timeline</button><button>Mixer</button><button>Sounds</button><button>More</button>
  </nav>

  <script>
    const play = document.getElementById('play');
    const record = document.getElementById('record');
    const rewind = document.getElementById('rewind');
    const clock = document.getElementById('clock');
    const playhead = document.getElementById('playhead');
    const addTrack = document.getElementById('addTrack');

    let playing = false;
    let recording = false;
    let elapsed = 0;
    let timer = null;

    function renderTime() {
      const minutes = Math.floor(elapsed / 60).toString().padStart(2, '0');
      const seconds = Math.floor(elapsed % 60).toString().padStart(2, '0');
      const tenth = Math.floor((elapsed % 1) * 10);
      clock.textContent = `${minutes}:${seconds}.${tenth}`;
      playhead.style.left = `${205 + ((elapsed * 38) % 610)}px`;
    }

    play.addEventListener('click', () => {
      playing = !playing;
      play.textContent = playing ? 'Ⅱ' : '▶';
      if (playing) {
        const started = performance.now() - elapsed * 1000;
        clearInterval(timer);
        timer = setInterval(() => {
          elapsed = (performance.now() - started) / 1000;
          renderTime();
        }, 50);
      } else {
        clearInterval(timer);
      }
    });

    record.addEventListener('click', () => {
      recording = !recording;
      record.classList.toggle('active', recording);
      record.textContent = recording ? '■' : '●';
    });

    rewind.addEventListener('click', () => {
      elapsed = 0;
      renderTime();
    });

    document.querySelectorAll('.mute, .solo').forEach(btn => {
      btn.addEventListener('click', () => btn.classList.toggle('active'));
    });

    document.querySelectorAll('.nav-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      });
    });

    document.querySelectorAll('.mobile-tabs button').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.mobile-tabs button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      });
    });

    addTrack?.addEventListener('click', () => {
      addTrack.textContent = 'Track added';
      setTimeout(() => addTrack.textContent = '＋ Add Track', 1200);
    });

    renderTime();
  </script>
</body>
</html>
