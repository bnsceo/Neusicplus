<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Neusicplus Native UI Preview</title>
<style>
:root{
  --bg:#070b0e;--panel:#11181d;--panel2:#172127;--line:#26333b;--text:#f4f7f8;
  --muted:#82919a;--amber:#f0b85a;--cyan:#37e7ff;--red:#ff5c66;--green:#67f0ad;
  --radius:18px;--gap:10px;--pad:12px;
}
*{box-sizing:border-box} html,body{margin:0;background:var(--bg);color:var(--text);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;min-height:100%}
body{min-height:100vh;overflow:hidden;background:radial-gradient(circle at 75% 0%,rgba(55,231,255,.08),transparent 30%),var(--bg)}
button,input{font:inherit} button{color:inherit}
.app{height:100vh;display:grid;grid-template-rows:auto auto 1fr auto;gap:8px;padding:max(10px,env(safe-area-inset-top)) 10px max(10px,env(safe-area-inset-bottom))}
.topbar,.transport,.dock{background:rgba(17,24,29,.92);border:1px solid var(--line);backdrop-filter:blur(18px);border-radius:16px}
.topbar{height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 14px}.brand{font-weight:900;letter-spacing:.13em;font-size:14px}.project{font-size:12px;color:var(--muted)}
.status{display:flex;align-items:center;gap:7px;color:var(--green);font-size:11px;font-weight:800}.dot{width:8px;height:8px;border-radius:999px;background:currentColor;box-shadow:0 0 12px currentColor}
.transport{display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:10px;padding:8px}.transport-left,.transport-right{display:flex;gap:7px}.iconbtn,.primary{border:1px solid var(--line);background:var(--panel2);height:42px;min-width:42px;border-radius:12px;font-weight:800}.primary{padding:0 18px;background:var(--amber);color:#1a1204;border-color:transparent}.rec{color:var(--red)}.clock{text-align:center;font-variant-numeric:tabular-nums;font-size:18px;font-weight:900;letter-spacing:.04em}.tempo{display:block;font-size:10px;color:var(--muted);margin-top:2px}
.workspace{min-height:0;display:grid;grid-template-columns:58px 1fr;gap:8px}.rail{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:8px 6px;display:flex;flex-direction:column;gap:8px}.rail button{height:42px;border-radius:11px;border:1px solid transparent;background:transparent;color:var(--muted);font-weight:900}.rail button.active{background:var(--panel2);color:var(--cyan);border-color:var(--line)}
.timeline{min-width:0;overflow:auto;background:linear-gradient(180deg,rgba(255,255,255,.012),transparent),var(--panel);border:1px solid var(--line);border-radius:16px;padding:8px}.ruler{height:28px;display:grid;grid-template-columns:repeat(16,minmax(52px,1fr));color:var(--muted);font-size:10px;align-items:end;border-bottom:1px solid var(--line);padding-bottom:5px;min-width:900px}.lane{position:relative;height:102px;min-width:900px;border-bottom:1px solid var(--line);display:grid;grid-template-columns:120px 1fr}.lane:last-child{border-bottom:0}.lanehead{padding:11px;border-right:1px solid var(--line);display:flex;flex-direction:column;justify-content:space-between}.lane-title{font-weight:800;font-size:13px}.lane-meta{font-size:10px;color:var(--muted)}.lane-actions{display:flex;gap:5px}.tiny{width:30px;height:26px;border-radius:8px;border:1px solid var(--line);background:var(--panel2);font-size:10px;font-weight:900}.tiny.on{background:var(--amber);color:#15100a}
.trackarea{position:relative;overflow:hidden;background-image:linear-gradient(to right,rgba(255,255,255,.045) 1px,transparent 1px);background-size:52px 100%}.clip{position:absolute;top:13px;bottom:13px;border-radius:12px;border:1px solid rgba(255,255,255,.16);padding:8px 10px;overflow:hidden}.clip.c1{left:18px;width:310px;background:linear-gradient(135deg,rgba(55,231,255,.28),rgba(55,231,255,.1))}.clip.c2{left:210px;width:420px;background:linear-gradient(135deg,rgba(240,184,90,.34),rgba(240,184,90,.1))}.clip.c3{left:95px;width:270px;background:linear-gradient(135deg,rgba(255,92,102,.3),rgba(255,92,102,.1))}.clip.c4{left:360px;width:360px;background:linear-gradient(135deg,rgba(103,240,173,.28),rgba(103,240,173,.1))}.clipname{font-size:11px;font-weight:850}.wave{height:42px;margin-top:7px;background:repeating-linear-gradient(90deg,currentColor 0 2px,transparent 2px 6px);opacity:.52;mask-image:linear-gradient(to bottom,transparent 0,black 20%,black 80%,transparent 100%)}.playhead{position:absolute;top:28px;bottom:0;left:38%;width:2px;background:var(--red);box-shadow:0 0 10px rgba(255,92,102,.8);z-index:10}.playhead:before{content:"";position:absolute;top:-3px;left:-5px;border-left:6px solid transparent;border-right:6px solid transparent;border-top:8px solid var(--red)}
.dock{display:flex;justify-content:space-around;gap:7px;padding:7px}.dock button{flex:1;height:46px;border-radius:12px;border:1px solid transparent;background:transparent;color:var(--muted);font-size:11px;font-weight:800}.dock button.active{background:var(--panel2);color:var(--text);border-color:var(--line)}
.sheet{position:fixed;inset:auto 10px max(10px,env(safe-area-inset-bottom)) 10px;background:#11191e;border:1px solid var(--line);border-radius:22px 22px 16px 16px;padding:14px;box-shadow:0 -24px 70px rgba(0,0,0,.5);transform:translateY(120%);transition:.28s ease;z-index:30}.sheet.open{transform:translateY(0)}.grab{width:44px;height:4px;border-radius:99px;background:#3b4a53;margin:0 auto 14px}.sheetgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.channel{background:var(--panel2);border:1px solid var(--line);border-radius:15px;padding:10px;text-align:center}.channel input[type=range]{writing-mode:vertical-lr;direction:rtl;height:150px;width:32px}.channel strong{font-size:11px;display:block;margin-top:6px}
@media (max-width:760px){.app{padding-left:7px;padding-right:7px}.topbar{height:48px}.project{display:none}.transport{grid-template-columns:1fr auto}.transport-right{display:none}.clock{text-align:right}.workspace{grid-template-columns:1fr}.rail{display:none}.timeline{padding:6px}.ruler,.lane{min-width:760px}.lane{grid-template-columns:104px 1fr;height:94px}.lanehead{padding:9px}.dock button{font-size:10px}.sheetgrid{grid-template-columns:repeat(4,minmax(68px,1fr));overflow-x:auto}.channel{min-width:72px}}
</style>
</head>
<body>
<div class="app">
  <header class="topbar"><div><div class="brand">NEUSICPLUS</div><div class="project">Untitled Session · 44.1 kHz</div></div><div class="status"><span class="dot"></span>AUDIO READY</div></header>
  <section class="transport">
    <div class="transport-left"><button class="iconbtn" id="rewind">↶</button><button class="primary" id="play">PLAY</button><button class="iconbtn rec" id="record">●</button></div>
    <div class="clock"><span id="time">00:00.0</span><span class="tempo">96 BPM · 4/4</span></div>
    <div class="transport-right"><button class="iconbtn">SAVE</button><button class="iconbtn">OPEN</button><button class="iconbtn">EXPORT</button></div>
  </section>
  <main class="workspace">
    <aside class="rail"><button class="active">ARR</button><button>MIX</button><button>FX</button><button>AI</button></aside>
    <section class="timeline">
      <div class="playhead" id="playhead"></div>
      <div class="ruler"><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span><span>9</span><span>10</span><span>11</span><span>12</span><span>13</span><span>14</span><span>15</span><span>16</span></div>
      <div class="lane"><div class="lanehead"><div><div class="lane-title">Voice</div><div class="lane-meta">Lead vocal</div></div><div class="lane-actions"><button class="tiny">M</button><button class="tiny">S</button><button class="tiny">FX</button></div></div><div class="trackarea"><div class="clip c1" style="color:var(--cyan)"><div class="clipname">Verse Take 03</div><div class="wave"></div></div></div></div>
      <div class="lane"><div class="lanehead"><div><div class="lane-title">Loop A</div><div class="lane-meta">Beat bed</div></div><div class="lane-actions"><button class="tiny">M</button><button class="tiny on">S</button><button class="tiny">FX</button></div></div><div class="trackarea"><div class="clip c2" style="color:var(--amber)"><div class="clipname">Pocket Loop</div><div class="wave"></div></div></div></div>
      <div class="lane"><div class="lanehead"><div><div class="lane-title">Harmony</div><div class="lane-meta">Stack</div></div><div class="lane-actions"><button class="tiny">M</button><button class="tiny">S</button><button class="tiny">FX</button></div></div><div class="trackarea"><div class="clip c3" style="color:var(--red)"><div class="clipname">Harmony High</div><div class="wave"></div></div></div></div>
      <div class="lane"><div class="lanehead"><div><div class="lane-title">Texture</div><div class="lane-meta">Atmosphere</div></div><div class="lane-actions"><button class="tiny">M</button><button class="tiny">S</button><button class="tiny">FX</button></div></div><div class="trackarea"><div class="clip c4" style="color:var(--green)"><div class="clipname">Air Pad</div><div class="wave"></div></div></div></div>
    </section>
  </main>
  <nav class="dock"><button class="active">ARRANGE</button><button id="mixerBtn">MIXER</button><button>LOOPS</button><button>FILES</button><button>NEUSIC AI</button></nav>
</div>
<div class="sheet" id="mixer"><div class="grab"></div><div class="sheetgrid">
  <div class="channel"><input type="range" min="0" max="100" value="78"><strong>VOICE</strong></div>
  <div class="channel"><input type="range" min="0" max="100" value="84"><strong>LOOP A</strong></div>
  <div class="channel"><input type="range" min="0" max="100" value="66"><strong>HARMONY</strong></div>
  <div class="channel"><input type="range" min="0" max="100" value="58"><strong>TEXTURE</strong></div>
</div></div>
<script>
let playing=false,elapsed=0,timer=null;const play=document.getElementById('play'),time=document.getElementById('time'),head=document.getElementById('playhead');
play.onclick=()=>{playing=!playing;play.textContent=playing?'PAUSE':'PLAY';if(playing){timer=setInterval(()=>{elapsed+=.1;const m=Math.floor(elapsed/60),s=(elapsed%60).toFixed(1).padStart(4,'0');time.textContent=String(m).padStart(2,'0')+':'+s;head.style.left=(12+(elapsed%20)*4)+'%'},100)}else clearInterval(timer)};
document.getElementById('rewind').onclick=()=>{elapsed=0;time.textContent='00:00.0';head.style.left='12%'};
document.getElementById('record').onclick=e=>e.currentTarget.classList.toggle('active');
const mixer=document.getElementById('mixer');document.getElementById('mixerBtn').onclick=()=>mixer.classList.toggle('open');mixer.onclick=e=>{if(e.target===mixer)mixer.classList.remove('open')};
document.querySelectorAll('.tiny').forEach(b=>b.onclick=()=>b.classList.toggle('on'));
</script>
</body>
</html>
